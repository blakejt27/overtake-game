<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVERTAKE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--yellow:#f5c500;--dark:#06060e;}
body{background:var(--dark);overflow:hidden;width:100vw;height:100vh;font-family:'Share Tech Mono',monospace;color:#cce;user-select:none;}
canvas{display:block;width:100vw;height:100vh;}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:14px 20px;pointer-events:none;z-index:10;}
.hud-block{display:flex;flex-direction:column;gap:2px;}
.hud-label{font-size:9px;letter-spacing:3px;color:#4466aa;text-transform:uppercase;}
.hud-val{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;color:var(--yellow);text-shadow:0 0 12px #f5c50066;}
.hud-val.big{font-size:32px;}
#weather-bar{position:fixed;top:56px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:4px;color:#88aacc;pointer-events:none;z-index:10;text-shadow:0 0 8px #88aacc88;}
#map-name-hud{position:fixed;top:72px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:3px;color:#334466;pointer-events:none;z-index:10;}
#speed-wrap{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none;z-index:10;width:180px;}
#speed-label{font-size:9px;letter-spacing:3px;color:#4466aa;}
#speed-bg{width:100%;height:5px;background:#0f1a2a;border-radius:3px;overflow:hidden;}
#speed-fill{height:100%;width:0%;background:linear-gradient(90deg,#30aaff,#f5c500);border-radius:3px;box-shadow:0 0 8px #30aaff88;}
#speed-val{font-family:'Orbitron',monospace;font-size:13px;color:#cce;}
.controls-hint{position:fixed;bottom:56px;right:16px;font-size:9px;letter-spacing:2px;color:#1e2e48;line-height:1.9;text-align:right;pointer-events:none;z-index:10;}

/* Overlays */
.overlay{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(6,6,18,0.94);z-index:100;}
.overlay h1{font-family:'Orbitron',monospace;font-size:clamp(38px,8vw,84px);font-weight:900;letter-spacing:10px;color:var(--yellow);text-shadow:0 0 30px #f5c50099,0 0 80px #f5c50033;margin-bottom:8px;}
.overlay .sub{font-size:11px;letter-spacing:5px;color:#4466aa;margin-bottom:36px;}
.overlay .big-score{font-family:'Orbitron',monospace;font-size:clamp(28px,5vw,52px);font-weight:700;color:#fff;margin-bottom:6px;text-shadow:0 0 20px #ffffff44;}
.overlay .score-label{font-size:10px;letter-spacing:4px;color:#4466aa;margin-bottom:36px;}
.overlay .best{font-size:13px;letter-spacing:3px;color:var(--yellow);margin-bottom:44px;}
.btn{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:4px;padding:13px 38px;background:transparent;border:2px solid var(--yellow);color:var(--yellow);cursor:pointer;transition:all .15s;}
.btn:hover{background:var(--yellow);color:var(--dark);box-shadow:0 0 28px #f5c50066;}
.btn-sm{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:3px;padding:10px 24px;background:transparent;border:1px solid #2a3a5a;color:#4466aa;cursor:pointer;transition:all .15s;}
.btn-sm:hover{border-color:var(--yellow);color:var(--yellow);}

/* Map Select */
#screen-maps{display:none;}
#map-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:0 32px 36px;max-width:740px;}
.map-card{position:relative;border:1px solid #1a2a3a;padding:0;cursor:pointer;transition:all .2s;overflow:hidden;aspect-ratio:3/4;}
.map-card:hover,.map-card.selected{border-color:var(--yellow);box-shadow:0 0 18px #f5c50044;}
.map-card canvas{display:block;width:100%;height:100%;}
.map-card-label{position:absolute;bottom:0;left:0;right:0;padding:8px 6px 6px;background:linear-gradient(transparent,rgba(6,6,18,0.95));text-align:center;}
.map-card-city{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:3px;color:var(--yellow);}
.map-card-road{font-size:8px;letter-spacing:2px;color:#4466aa;margin-top:2px;}
.map-card.selected .map-card-city{color:#fff;}
#map-hint{font-size:9px;letter-spacing:3px;color:#2a3a5a;margin-bottom:28px;}

#crash-flash{position:fixed;inset:0;background:rgba(255,30,30,0.65);pointer-events:none;z-index:50;opacity:0;transition:opacity .05s;}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div class="hud-block">
    <div class="hud-label">Score</div>
    <div class="hud-val big" id="hud-score">0</div>
  </div>
  <div class="hud-block" style="align-items:center">
    <div class="hud-label">Level</div>
    <div class="hud-val" id="hud-level">1</div>
  </div>
  <div class="hud-block" style="align-items:flex-end">
    <div class="hud-label">Best</div>
    <div class="hud-val" id="hud-best">0</div>
  </div>
</div>
<div id="weather-bar">☀  CLEAR</div>
<div id="map-name-hud"></div>

<div id="speed-wrap">
  <div id="speed-label">SPEED</div>
  <div id="speed-bg"><div id="speed-fill"></div></div>
  <div id="speed-val">0 km/h</div>
</div>
<div class="controls-hint">↑ / W &nbsp;ACCELERATE<br>↓ / S &nbsp;BRAKE<br>← / → &nbsp;LANE</div>
<div id="crash-flash"></div>

<!-- Start -->
<div class="overlay" id="screen-start">
  <h1>OVERTAKE</h1>
  <div class="sub">HIGHWAY SURVIVAL — AERIAL VIEW</div>
  <button class="btn" onclick="showMapSelect()">SELECT CITY</button>
  <div style="margin-top:22px;font-size:10px;letter-spacing:3px;color:#1e2e48;">ARROW KEYS OR WASD</div>
</div>

<!-- Map Select -->
<div class="overlay" id="screen-maps">
  <h1 style="font-size:clamp(24px,5vw,48px);margin-bottom:6px;">CHOOSE YOUR CITY</h1>
  <div class="sub">EACH HIGHWAY HAS ITS OWN PERSONALITY</div>
  <div id="map-grid"></div>
  <div id="map-hint">CLICK A CITY TO SELECT · PRESS START TO DRIVE</div>
  <button class="btn" id="btn-start-map" onclick="startGame()">START ENGINE</button>
</div>

<!-- Game Over -->
<div class="overlay" id="screen-gameover" style="display:none">
  <h1>WRECKED</h1>
  <div class="sub">TOTAL LOSS</div>
  <div class="big-score" id="go-score">0</div>
  <div class="score-label">FINAL SCORE</div>
  <div class="best" id="go-best">BEST: 0</div>
  <div style="display:flex;gap:16px;">
    <button class="btn" onclick="startGame()">TRY AGAIN</button>
    <button class="btn-sm" onclick="showMapSelect()">CHANGE CITY</button>
  </div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

// ── Dimensions ───────────────────────────────────────────────
let W,H,LANES=5,ROAD_LEFT,ROAD_RIGHT,ROAD_W,LANE_W;
function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  ROAD_W=Math.min(W*0.62,360);
  ROAD_LEFT=(W-ROAD_W)/2;
  ROAD_RIGHT=ROAD_LEFT+ROAD_W;
  LANE_W=ROAD_W/LANES;
}
resize();
window.addEventListener('resize',resize);
function laneX(l){return ROAD_LEFT+l*LANE_W+LANE_W/2;}

// ── City Maps ────────────────────────────────────────────────
const MAPS = [
  {
    id:'la',
    city:'LOS ANGELES',
    road:'I-405 · SAN DIEGO FWY',
    lanes:5,
    // Warm concrete, sun-bleached
    roadColor:['#1e1e18','#191910','#1e1e18'],
    vergeColor:'#1a1a0e',
    edgeColor:'#e8e0a0cc',
    dashColor:'rgba(240,230,160,0.18)',
    lampColor:'rgba(255,240,160,0.1)',
    fogBase:0.04, // smog
    weatherWeights:[4,3,2,1,2,1], // more clear/cloudy, rare storms
    trafficBias:1.2, // notoriously heavy
    ambientTint:null,
    desc:'Perpetual gridlock on the 405',
  },
  {
    id:'nyc',
    city:'NEW YORK',
    road:'I-278 · STATEN ISLAND EXPY',
    lanes:5,
    // Dark wet asphalt
    roadColor:['#111116','#0d0d12','#111116'],
    vergeColor:'#0a0f0a',
    edgeColor:'#ffffffaa',
    dashColor:'rgba(255,255,255,0.2)',
    lampColor:'rgba(255,210,120,0.1)',
    fogBase:0.0,
    weatherWeights:[2,3,3,2,2,3], // all weather common
    trafficBias:1.3,
    ambientTint:'rgba(255,180,60,0.03)', // orange streetlight cast
    desc:'Aggressive drivers, every weather',
  },
  {
    id:'miami',
    city:'MIAMI',
    road:'I-95 · NORTH-SOUTH EXPY',
    lanes:5,
    // Pink-tinged night road
    roadColor:['#18101a','#130e16','#18101a'],
    vergeColor:'#0d110a',
    edgeColor:'#ff88ccbb',
    dashColor:'rgba(255,160,220,0.18)',
    lampColor:'rgba(255,120,200,0.08)',
    fogBase:0.05, // humidity haze
    weatherWeights:[3,2,3,3,2,1],
    trafficBias:1.0,
    ambientTint:'rgba(180,80,180,0.04)',
    desc:'Neon nights and sudden storms',
  },
  {
    id:'chicago',
    city:'CHICAGO',
    road:'I-94 · DAN RYAN EXPY',
    lanes:5,
    // Grey, gritty, industrial
    roadColor:['#161618','#111114','#161618'],
    vergeColor:'#0c0d0e',
    edgeColor:'#aaaaee99',
    dashColor:'rgba(180,180,255,0.15)',
    lampColor:'rgba(200,220,255,0.08)',
    fogBase:0.08, // lake effect
    weatherWeights:[1,2,3,4,2,4], // lots of storms/sleet
    trafficBias:1.1,
    ambientTint:'rgba(100,130,200,0.04)',
    desc:'Lake effect weather, brutal winters',
  },
  {
    id:'houston',
    city:'HOUSTON',
    road:'I-10 · KATY FREEWAY',
    lanes:6, // widest highway in the world!
    roadColor:['#181410','#13100c','#181410'],
    vergeColor:'#0e0f08',
    edgeColor:'#f0c870bb',
    dashColor:'rgba(240,200,100,0.16)',
    lampColor:'rgba(255,200,80,0.09)',
    fogBase:0.06, // humid haze
    weatherWeights:[3,2,3,3,1,1], // rain and storms common
    trafficBias:0.95,
    ambientTint:'rgba(200,160,60,0.03)',
    desc:'26 lanes wide — room to run',
  },
];

let selectedMapIdx = 0;
let currentMap = MAPS[0];

// ── State ────────────────────────────────────────────────────
let state='start';
let score=0,bestScore=0,level=1,levelTimer=0,deathTimer=0,gracePeriod=0;

// ── Weather ──────────────────────────────────────────────────
const WEATHERS=[
  {name:'☀  CLEAR',  rain:0,  fog:0,   speedMult:1.0, trafficMult:1.0 },
  {name:'🌤  CLOUDY', rain:0,  fog:0.1, speedMult:0.95,trafficMult:1.05},
  {name:'🌧  RAIN',   rain:1,  fog:0.08,speedMult:0.82,trafficMult:1.15},
  {name:'⛈  STORM',  rain:2,  fog:0.18,speedMult:0.72,trafficMult:1.25},
  {name:'🌫  FOG',    rain:0,  fog:0.44,speedMult:0.88,trafficMult:1.1 },
  {name:'🌨  SLEET',  rain:1.5,fog:0.28,speedMult:0.65,trafficMult:1.3 },
];
let weatherIdx=0,weatherTimer=0,weatherDur=30,currentWeather=WEATHERS[0];

function nextWeather(){
  // Weighted pick based on map
  const w=currentMap.weatherWeights;
  const total=w.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<w.length;i++){r-=w[i];if(r<=0)return i;}
  return 0;
}

// ── Player ───────────────────────────────────────────────────
let player={lane:2,targetLane:2,x:0,y:0,speed:0,maxSpeed:5,w:18,h:34,changeCooldown:0,alive:true,crashAnim:0,wobble:0};

// ── Keys ─────────────────────────────────────────────────────
const keys={};
window.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.key]=false;});
let tx0=0,ty0=0;
canvas.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx0,dy=e.changedTouches[0].clientY-ty0;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>25){keys['ArrowRight']=true;setTimeout(()=>keys['ArrowRight']=false,120);}
    else if(dx<-25){keys['ArrowLeft']=true;setTimeout(()=>keys['ArrowLeft']=false,120);}
  }else{
    if(dy<-25){keys['ArrowUp']=true;setTimeout(()=>keys['ArrowUp']=false,120);}
    else if(dy>25){keys['ArrowDown']=true;setTimeout(()=>keys['ArrowDown']=false,120);}
  }
},{passive:true});

// ── Traffic ──────────────────────────────────────────────────
let cars=[];
const CAR_TYPES=[
  {type:'sedan', w:17,h:33,colors:['#c0392b','#2980b9','#27ae60','#8e44ad','#e67e22','#bdc3c7','#f1c40f','#1abc9c']},
  {type:'suv',   w:19,h:36,colors:['#2c3e50','#7f8c8d','#c0392b','#16a085','#d35400','#f0f0f0','#2e4053']},
  {type:'sports',w:16,h:30,colors:['#e74c3c','#f39c12','#1a1a2e','#0d7377','#ff6b6b','#ffd93d']},
  {type:'truck', w:20,h:44,colors:['#5d4e37','#3d3d3d','#8b7355','#4a4a4a','#6b4c11']},
  {type:'van',   w:20,h:40,colors:['#ecf0f1','#bdc3c7','#2c3e50','#e8f4f8','#d5dbdb']},
];
function randColor(arr){return arr[Math.floor(Math.random()*arr.length)];}

function baseTrafficSpeed(){
  return (2.4+level*0.2)*currentWeather.speedMult*currentMap.trafficBias;
}

function spawnCar(forceY,forceLane){
  const tDef=CAR_TYPES[Math.floor(Math.random()*CAR_TYPES.length)];
  const lane=forceLane!==undefined?forceLane:Math.floor(Math.random()*LANES);
  const spd=baseTrafficSpeed()*(0.55+Math.random()*0.9);
  return {
    lane,x:laneX(lane),
    y:forceY!==undefined?forceY:-60,
    speed:spd,baseSpeed:spd,
    w:tDef.w,h:tDef.h,type:tDef.type,
    color:randColor(tDef.colors),
    braking:false,changeCooldown:Math.random()*120,
  };
}

function initTraffic(){
  cars=[];
  const playerY=H*0.72;
  const safeAbove=H*0.36; // clear zone ahead of player
  const safeBehind=H*0.22; // clear zone behind player
  for(let i=0;i<18;i++){
    let y;
    if(Math.random()<0.65){
      // Spawn well ahead (above) player
      const maxY=playerY-safeAbove;
      y=maxY>40?Math.random()*maxY:Math.random()*H*0.2;
    }else{
      // Spawn behind (below) player — already passed
      y=playerY+safeBehind+Math.random()*(H-(playerY+safeBehind)-20);
    }
    cars.push(spawnCar(y));
  }
}

// ── Road scroll ──────────────────────────────────────────────
let roadOffset=0;
const DASH_H=32,DASH_GAP=22;

// ── Particles ────────────────────────────────────────────────
let particles=[];
function spawnCrash(x,y){
  for(let i=0;i<55;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*7;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.018+Math.random()*0.025,r:2+Math.random()*5,color:Math.random()<0.4?'#ff4400':Math.random()<0.5?'#f5c500':'#ffaaaa'});
  }
}

// ── Rain ─────────────────────────────────────────────────────
let rainDrops=Array.from({length:300},()=>({x:Math.random()*1200,y:Math.random()*900,speed:11+Math.random()*9,len:12+Math.random()*14}));

// ── Map Select UI ────────────────────────────────────────────
function showMapSelect(){
  document.getElementById('screen-start').style.display='none';
  document.getElementById('screen-gameover').style.display='none';
  document.getElementById('screen-maps').style.display='flex';
  buildMapGrid();
}

function buildMapGrid(){
  const grid=document.getElementById('map-grid');
  grid.innerHTML='';
  MAPS.forEach((map,i)=>{
    const card=document.createElement('div');
    card.className='map-card'+(i===selectedMapIdx?' selected':'');
    card.onclick=()=>selectMap(i);

    // Mini preview canvas
    const mc=document.createElement('canvas');
    mc.width=120;mc.height=160;
    card.appendChild(mc);
    drawMapPreview(mc,map);

    const lbl=document.createElement('div');
    lbl.className='map-card-label';
    lbl.innerHTML=`<div class="map-card-city">${map.city}</div><div class="map-card-road">${map.road}</div>`;
    card.appendChild(lbl);
    grid.appendChild(card);
  });
}

function selectMap(i){
  selectedMapIdx=i;
  currentMap=MAPS[i];
  LANES=currentMap.lanes;
  ROAD_W=Math.min(W*0.62,LANES===6?420:360);
  ROAD_LEFT=(W-ROAD_W)/2;ROAD_RIGHT=ROAD_LEFT+ROAD_W;LANE_W=ROAD_W/LANES;
  document.querySelectorAll('.map-card').forEach((c,j)=>c.classList.toggle('selected',j===i));
}

function drawMapPreview(mc,map){
  const mctx=mc.getContext('2d');
  const mw=mc.width,mh=mc.height;
  const lanes=map.lanes;
  const lw=mw/lanes;

  // Verge
  mctx.fillStyle=map.vergeColor;
  mctx.fillRect(0,0,mw,mh);

  // Road
  const rd=mctx.createLinearGradient(0,0,mw,0);
  rd.addColorStop(0,map.roadColor[0]);rd.addColorStop(0.5,map.roadColor[1]);rd.addColorStop(1,map.roadColor[2]);
  mctx.fillStyle=rd;mctx.fillRect(0,0,mw,mh);

  // Edges
  mctx.fillStyle=map.edgeColor;mctx.fillRect(0,0,3,mh);mctx.fillRect(mw-3,0,3,mh);

  // Dashes
  for(let l=1;l<lanes;l++){
    const x=l*lw;
    mctx.strokeStyle=map.dashColor;mctx.lineWidth=1.5;
    mctx.setLineDash([18,14]);mctx.lineDashOffset=0;
    mctx.beginPath();mctx.moveTo(x,0);mctx.lineTo(x,mh);mctx.stroke();mctx.setLineDash([]);
  }

  // Sample cars
  const sampleCars=[
    {lane:0,y:30,color:'#c0392b',type:'sedan'},
    {lane:2,y:70,color:'#2980b9',type:'suv'},
    {lane:lanes-1,y:50,color:'#27ae60',type:'sports'},
    {lane:1,y:110,color:'#e67e22',type:'sedan'},
    {lane:lanes-2,y:130,color:'#8e44ad',type:'truck'},
  ];
  sampleCars.forEach(sc=>{
    const cx=sc.lane*lw+lw/2;
    mctx.fillStyle=sc.color;
    mctx.beginPath();mctx.roundRect(cx-6,sc.y-10,12,20,2);mctx.fill();
    mctx.fillStyle='rgba(160,210,255,0.5)';
    mctx.beginPath();mctx.roundRect(cx-4,sc.y-8,8,6,1);mctx.fill();
    mctx.fillStyle='#ffffcc';
    mctx.fillRect(cx-5,sc.y-11,4,2);mctx.fillRect(cx+1,sc.y-11,4,2);
  });

  // Player preview car
  const px=Math.floor(lanes/2)*lw+lw/2;
  mctx.fillStyle='#1e88e5';
  mctx.beginPath();mctx.roundRect(px-6,mh*0.72-10,12,20,2);mctx.fill();
  mctx.strokeStyle='rgba(48,170,255,0.8)';mctx.lineWidth=1.5;
  mctx.beginPath();mctx.roundRect(px-6,mh*0.72-10,12,20,2);mctx.stroke();
}

// ── Start Game ───────────────────────────────────────────────
function startGame(){
  document.getElementById('screen-start').style.display='none';
  document.getElementById('screen-maps').style.display='none';
  document.getElementById('screen-gameover').style.display='none';

  // Apply map config
  currentMap=MAPS[selectedMapIdx];
  LANES=currentMap.lanes;
  ROAD_W=Math.min(W*0.62,LANES===6?420:360);
  ROAD_LEFT=(W-ROAD_W)/2;ROAD_RIGHT=ROAD_LEFT+ROAD_W;LANE_W=ROAD_W/LANES;

  score=0;level=1;levelTimer=0;deathTimer=0;
  weatherIdx=0;currentWeather=WEATHERS[0];weatherTimer=0;weatherDur=30;
  particles=[];roadOffset=0;
  document.getElementById('weather-bar').textContent=currentWeather.name;
  document.getElementById('map-name-hud').textContent=currentMap.city+' · '+currentMap.road;
  document.getElementById('hud-level').textContent='1';

  const midLane=Math.floor(LANES/2);
  player.lane=midLane;player.targetLane=midLane;
  player.x=laneX(midLane);player.y=H*0.72;
  player.speed=2.6;player.changeCooldown=0;
  player.alive=true;player.crashAnim=0;player.wobble=0;
  gracePeriod=200;
  initTraffic();
  state='playing';
}

// ── Update ───────────────────────────────────────────────────
function update(dt){
  if(state!=='playing')return;

  levelTimer+=dt;
  if(levelTimer>30*60){level++;levelTimer=0;document.getElementById('hud-level').textContent=level;}

  weatherTimer+=dt;
  if(weatherTimer>weatherDur*60){
    weatherTimer=0;
    weatherIdx=nextWeather();
    currentWeather=WEATHERS[weatherIdx];
    weatherDur=20+Math.random()*40;
    document.getElementById('weather-bar').textContent=currentWeather.name;
  }

  score+=player.speed*0.055*dt;
  document.getElementById('hud-score').textContent=Math.floor(score);

  // Input
  const accel=keys['ArrowUp']||keys['w']||keys['W'];
  const brake=keys['ArrowDown']||keys['s']||keys['S'];
  const goL=keys['ArrowLeft']||keys['a']||keys['A'];
  const goR=keys['ArrowRight']||keys['d']||keys['D'];

  const wMax=(2.8+level*0.28)*currentWeather.speedMult;
  player.maxSpeed=wMax;

  if(accel) player.speed=Math.min(player.maxSpeed,player.speed+0.07*dt);
  else if(brake) player.speed=Math.max(0.3,player.speed-0.11*dt);
  else player.speed+=(2.0-player.speed)*0.012*dt;

  if(player.changeCooldown>0) player.changeCooldown-=dt;
  if(goL&&player.changeCooldown<=0&&player.targetLane>0){player.targetLane--;player.changeCooldown=20;player.wobble=-0.18;}
  if(goR&&player.changeCooldown<=0&&player.targetLane<LANES-1){player.targetLane++;player.changeCooldown=20;player.wobble=0.18;}
  player.wobble*=0.88;
  player.x+=(laneX(player.targetLane)-player.x)*0.14*dt;
  player.y=H*0.72;

  roadOffset=(roadOffset+player.speed*dt*2.4)%(DASH_H+DASH_GAP);

  // Traffic
  const targetCount=Math.floor(12+level*3.5*currentWeather.trafficMult*currentMap.trafficBias);
  if(cars.length<targetCount&&Math.random()<0.07*dt) cars.push(spawnCar());

  cars.forEach(car=>{
    const isBehind = car.y > player.y + player.h * 0.5;

    // Longitudinal speed logic
    if(isBehind){
      const safeTarget = Math.min(car.baseSpeed, player.speed * 0.88);
      const gapBehind = car.y - player.y;
      const tooClose = car.lane === player.lane && gapBehind < 70;
      if(tooClose){ car.speed = Math.max(0, car.speed - 0.1 * dt); car.braking = true; }
      else { car.speed += (safeTarget - car.speed) * 0.035 * dt; car.braking = car.speed < car.baseSpeed * 0.65; }
    } else {
      let ahead = null, minD = Infinity;
      cars.forEach(o=>{
        if(o===car || o.lane!==car.lane) return;
        const d = car.y - o.y;
        if(d > 0 && d < 220 && d < minD){ minD = d; ahead = o; }
      });
      const playerInLane = car.lane === player.lane && car.y > player.y && (car.y - player.y) < 220;
      const playerDist = playerInLane ? (car.y - player.y) : Infinity;
      const effDist = Math.min(minD, playerDist);
      const effSpd = playerInLane && playerDist < minD ? player.speed : (ahead ? ahead.speed : Infinity);
      if(effDist < 52){ car.speed = Math.max(0.05, car.speed - 0.07 * dt); car.braking = true; }
      else if(effDist < 140){ car.speed += (effSpd * 0.86 - car.speed) * 0.04 * dt; car.braking = false; }
      else { car.speed += (car.baseSpeed - car.speed) * 0.02 * dt; car.braking = false; }
    }

    // World movement
    car.y += (player.speed - car.speed) * dt * 2.2;

    // Lateral awareness: never merge into player
    const lateralDist = Math.abs(car.x - player.x);
    const alongsideDy = Math.abs(car.y - player.y);
    const carBodyW = (car.w + player.w) * 0.6;
    const carBodyH = (car.h + player.h) * 0.7;
    const playerAlongside = lateralDist < carBodyW + LANE_W * 0.6 && alongsideDy < carBodyH;

    if(car.changeCooldown > 0){ car.changeCooldown -= dt; }
    else if(Math.random() < 0.003 * dt){
      const dirs = Math.random() < 0.5 ? [-1, 1] : [1, -1];
      for(const d of dirs){
        const nl = car.lane + d;
        if(nl < 0 || nl >= LANES) continue;
        const targetX = laneX(nl);
        const playerInTargetLane = Math.abs(player.x - targetX) < LANE_W * 0.7 && alongsideDy < carBodyH * 1.2;
        if(playerInTargetLane) continue;
        const blocked = cars.some(o => o !== car && o.lane === nl && Math.abs(o.y - car.y) < 65);
        if(!blocked){ car.lane = nl; car.changeCooldown = 70 + Math.random() * 90; break; }
      }
    }

    // Smooth steering toward lane centre; ease off if player is alongside
    const laneTarget = laneX(car.lane);
    const laneErr = laneTarget - car.x;
    const lateralRate = playerAlongside ? 0.04 : 0.09;
    car.x += laneErr * lateralRate * dt;
  });

  // Recycle
  cars=cars.filter(c=>{
    if(c.y>H+100){return false;} // passed behind, remove
    if(c.y<-100){c.y=H+80;c.lane=Math.floor(Math.random()*LANES);c.x=laneX(c.lane);return true;}
    return true;
  });

  // Collision (only with cars roughly alongside or ahead — not from behind)
  if(player.alive){
    if(gracePeriod>0){gracePeriod-=dt;}
    else{
      for(const car of cars){
        // Only collide if car is within vertical proximity AND not cleanly behind
        const dy=car.y-player.y;
        // Skip cars that are cleanly behind (more than half a car length behind player rear)
        if(dy>player.h*0.8+car.h*0.5) continue;
        const adx=Math.abs(car.x-player.x),ady=Math.abs(dy);
        const hw=(player.w+car.w)*0.38,hh=(player.h+car.h)*0.38;
        if(adx<hw&&ady<hh){triggerCrash();break;}
      }
    }
  }

  if(!player.alive){player.crashAnim+=dt;deathTimer-=dt;if(deathTimer<=0)showGameOver();}

  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.12*dt;p.life-=p.decay*dt;});
  particles=particles.filter(p=>p.life>0);

  if(currentWeather.rain>0){
    rainDrops.forEach(d=>{
      d.y+=d.speed*currentWeather.rain*dt;d.x+=1.5*dt;
      if(d.y>H){d.y=-d.len;d.x=Math.random()*W;}
      if(d.x>W)d.x=0;
    });
  }

  const kmh=Math.floor(player.speed*58);
  document.getElementById('speed-val').textContent=kmh+' km/h';
  document.getElementById('speed-fill').style.width=Math.min(100,(player.speed/(player.maxSpeed||5))*100)+'%';
}

function triggerCrash(){
  player.alive=false;player.crashAnim=0;deathTimer=130;
  spawnCrash(player.x,player.y);
  if(score>bestScore)bestScore=score;
  const f=document.getElementById('crash-flash');
  f.style.opacity='1';setTimeout(()=>f.style.opacity='0',220);
}

function showGameOver(){
  state='dead';
  document.getElementById('go-score').textContent=Math.floor(score);
  document.getElementById('go-best').textContent='BEST: '+Math.floor(bestScore);
  document.getElementById('hud-best').textContent=Math.floor(bestScore);
  document.getElementById('screen-gameover').style.display='flex';
}

// ── Draw Road ────────────────────────────────────────────────
function drawRoad(){
  const map=currentMap;
  const fog=Math.max(currentWeather.fog,map.fogBase);

  // Verge
  ctx.fillStyle=map.vergeColor;
  ctx.fillRect(0,0,W,H);

  // Road
  const rd=ctx.createLinearGradient(ROAD_LEFT,0,ROAD_RIGHT,0);
  rd.addColorStop(0,map.roadColor[0]);rd.addColorStop(0.5,map.roadColor[1]);rd.addColorStop(1,map.roadColor[2]);
  ctx.fillStyle=rd;ctx.fillRect(ROAD_LEFT,0,ROAD_W,H);

  // Ambient tint
  if(map.ambientTint){ctx.fillStyle=map.ambientTint;ctx.fillRect(ROAD_LEFT,0,ROAD_W,H);}

  // Edge lines
  ctx.fillStyle=map.edgeColor;
  ctx.fillRect(ROAD_LEFT,0,3,H);
  ctx.fillRect(ROAD_RIGHT-3,0,3,H);

  // Lane dashes
  for(let l=1;l<LANES;l++){
    const x=ROAD_LEFT+l*LANE_W;
    ctx.strokeStyle=map.dashColor;ctx.lineWidth=2;
    ctx.setLineDash([DASH_H,DASH_GAP]);ctx.lineDashOffset=-roadOffset;
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();ctx.setLineDash([]);
  }

  // Lamp glow
  const lampSpacing=200,lampOff=(roadOffset*0.6)%lampSpacing;
  for(let y=-lampSpacing+lampOff;y<H+lampSpacing;y+=lampSpacing){
    const g1=ctx.createRadialGradient(ROAD_LEFT-8,y,0,ROAD_LEFT-8,y,55);
    g1.addColorStop(0,map.lampColor);g1.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g1;ctx.fillRect(ROAD_LEFT-65,y-55,130,110);
    const g2=ctx.createRadialGradient(ROAD_RIGHT+8,y,0,ROAD_RIGHT+8,y,55);
    g2.addColorStop(0,map.lampColor);g2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g2;ctx.fillRect(ROAD_RIGHT-65,y-55,130,110);
  }

  // Fog
  if(fog>0){ctx.fillStyle=`rgba(160,180,200,${fog*0.5})`;ctx.fillRect(0,0,W,H);}
}

// ── Draw Car ─────────────────────────────────────────────────
// Hyper-realistic top-down car renderer with type-specific silhouettes
function drawCar(x,y,w,h,type,color,braking,isPlayer,wobble,alpha){
  ctx.save();
  if(alpha!==undefined) ctx.globalAlpha=alpha;
  ctx.translate(x,y);
  if(wobble) ctx.rotate(wobble);
  const hw=w/2, hh=h/2;

  // ── Tyre marks / road shadow ──────────────────────────────
  ctx.save();
  ctx.globalAlpha=(ctx.globalAlpha||1)*0.22;
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.ellipse(1,5,hw*1.15,hh*0.75,0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();

  // ── Helper: parse hex color for tinting ──────────────────
  function hexToRgb(hex){
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return{r,g,b};
  }
  function darken(hex,amt){
    const c=hexToRgb(hex);
    return `rgb(${Math.max(0,c.r-amt)},${Math.max(0,c.g-amt)},${Math.max(0,c.b-amt)})`;
  }
  function lighten(hex,amt){
    const c=hexToRgb(hex);
    return `rgb(${Math.min(255,c.r+amt)},${Math.min(255,c.g+amt)},${Math.min(255,c.b+amt)})`;
  }

  // ────────────────────────────────────────────────────────────
  // TYPE-SPECIFIC SILHOUETTES
  // Each car type has unique panel shapes drawn top-down
  // ────────────────────────────────────────────────────────────

  if(type==='sedan'){
    // Sedan: distinct hood (front), passenger cabin (middle), trunk (rear)
    // Hood - tapers slightly
    ctx.fillStyle=darken(color,18);
    ctx.beginPath();
    ctx.moveTo(-hw+2,-hh);ctx.lineTo(hw-2,-hh);
    ctx.lineTo(hw-1,-hh+h*0.26);ctx.lineTo(-hw+1,-hh+h*0.26);ctx.closePath();ctx.fill();
    // Main body
    ctx.fillStyle=color;
    ctx.beginPath();ctx.roundRect(-hw,-hh,w,h,3);ctx.fill();
    // Hood overlay
    ctx.fillStyle=darken(color,12);
    ctx.beginPath();
    ctx.moveTo(-hw+1.5,-hh+1);ctx.lineTo(hw-1.5,-hh+1);
    ctx.lineTo(hw-2,-hh+h*0.25);ctx.lineTo(-hw+2,-hh+h*0.25);ctx.closePath();ctx.fill();
    // Trunk
    ctx.fillStyle=darken(color,8);
    ctx.beginPath();
    ctx.moveTo(-hw+2,hh-h*0.2);ctx.lineTo(hw-2,hh-h*0.2);
    ctx.lineTo(hw-2,hh-1);ctx.lineTo(-hw+2,hh-1);ctx.closePath();ctx.fill();
    // Cabin roof (raised, lighter)
    ctx.fillStyle=darken(color,28);
    ctx.beginPath();ctx.roundRect(-hw*0.75,-hh+h*0.25,w*0.75,h*0.48,3);ctx.fill();
    // Cabin highlight
    ctx.fillStyle=lighten(color,8);
    ctx.beginPath();ctx.roundRect(-hw*0.7,-hh+h*0.26,w*0.38,h*0.06,2);ctx.fill();
    // Panel line - door crease
    ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=0.7;
    ctx.beginPath();ctx.moveTo(-hw,-hh+h*0.5);ctx.lineTo(hw,-hh+h*0.5);ctx.stroke();
    // Door handles
    ctx.fillStyle='rgba(200,200,200,0.6)';
    ctx.beginPath();ctx.roundRect(-hw+1,-hh+h*0.42,2.5,1.5,0.5);ctx.fill();
    ctx.beginPath();ctx.roundRect(hw-3.5,-hh+h*0.42,2.5,1.5,0.5);ctx.fill();
    ctx.beginPath();ctx.roundRect(-hw+1,-hh+h*0.6,2.5,1.5,0.5);ctx.fill();
    ctx.beginPath();ctx.roundRect(hw-3.5,-hh+h*0.6,2.5,1.5,0.5);ctx.fill();

  } else if(type==='suv'){
    // SUV: boxy, tall roof line, large greenhouse, visible wheel arches
    ctx.fillStyle=color;
    ctx.beginPath();ctx.roundRect(-hw,-hh,w,h,4);ctx.fill();
    // Hood
    ctx.fillStyle=darken(color,14);
    ctx.beginPath();ctx.roundRect(-hw+1,-hh+1,w-2,h*0.22,2);ctx.fill();
    // Large flat roof
    ctx.fillStyle=darken(color,22);
    ctx.beginPath();ctx.roundRect(-hw*0.78,-hh+h*0.2,w*0.78,h*0.55,3);ctx.fill();
    // Roof rails
    ctx.strokeStyle='rgba(80,80,80,0.7)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-hw*0.72,-hh+h*0.22);ctx.lineTo(-hw*0.72,-hh+h*0.72);ctx.stroke();
    ctx.beginPath();ctx.moveTo(hw*0.72-2,-hh+h*0.22);ctx.lineTo(hw*0.72-2,-hh+h*0.72);ctx.stroke();
    // Panel crease
    ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(-hw,-hh+h*0.48);ctx.lineTo(hw,-hh+h*0.48);ctx.stroke();
    // Wheel arch bulges
    ctx.strokeStyle=darken(color,20);ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(-hw+4,-hh+h*0.22,4,Math.PI*0.9,Math.PI*2.1);ctx.stroke();
    ctx.beginPath();ctx.arc(hw-4,-hh+h*0.22,4,Math.PI*0.9,Math.PI*2.1);ctx.stroke();
    ctx.beginPath();ctx.arc(-hw+4,hh-h*0.22,4,0,Math.PI*1.1);ctx.stroke();
    ctx.beginPath();ctx.arc(hw-4,hh-h*0.22,4,0,Math.PI*1.1);ctx.stroke();
    // Door handle
    ctx.fillStyle='rgba(180,180,180,0.55)';
    ctx.beginPath();ctx.roundRect(-hw+1,-hh+h*0.4,2.5,1.8,0.5);ctx.fill();
    ctx.beginPath();ctx.roundRect(hw-3.5,-hh+h*0.4,2.5,1.8,0.5);ctx.fill();

  } else if(type==='sports'){
    // Sports car: low, wide, aggressive hood scoop, rear spoiler
    ctx.fillStyle=color;
    ctx.beginPath();
    // Wider body that tapers at both ends
    ctx.moveTo(-hw+3,-hh);ctx.lineTo(hw-3,-hh);
    ctx.quadraticCurveTo(hw+1,-hh,hw,-hh+3);
    ctx.lineTo(hw,-hh+h*0.7);
    ctx.quadraticCurveTo(hw+1,hh,hw-2,hh);
    ctx.lineTo(-hw+2,hh);
    ctx.quadraticCurveTo(-hw-1,hh,-hw,-hh+h*0.7);
    ctx.lineTo(-hw,-hh+3);
    ctx.quadraticCurveTo(-hw-1,-hh,-hw+3,-hh);
    ctx.closePath();ctx.fill();
    // Long hood
    ctx.fillStyle=darken(color,16);
    ctx.beginPath();ctx.moveTo(-hw+3,-hh+1);ctx.lineTo(hw-3,-hh+1);ctx.lineTo(hw-4,-hh+h*0.3);ctx.lineTo(-hw+4,-hh+h*0.3);ctx.closePath();ctx.fill();
    // Hood scoop
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.beginPath();ctx.ellipse(0,-hh+h*0.16,hw*0.22,h*0.05,0,0,Math.PI*2);ctx.fill();
    // Low cabin
    ctx.fillStyle=darken(color,30);
    ctx.beginPath();ctx.roundRect(-hw*0.62,-hh+h*0.3,w*0.62,h*0.36,3);ctx.fill();
    // Rear spoiler
    ctx.fillStyle=darken(color,10);
    ctx.beginPath();ctx.roundRect(-hw*0.7,hh-h*0.12,w*0.7,h*0.06,1);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-hw*0.68,hh-h*0.12);ctx.lineTo(-hw*0.68,hh-h*0.18);ctx.stroke();
    ctx.beginPath();ctx.moveTo(hw*0.68-2,hh-h*0.12);ctx.lineTo(hw*0.68-2,hh-h*0.18);ctx.stroke();
    // Side skirt line
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(-hw,-hh+h*0.72);ctx.lineTo(hw,-hh+h*0.72);ctx.stroke();

  } else if(type==='truck'){
    // Pickup truck: cab + bed with distinct sections
    const cabH=h*0.48, bedH=h*0.46, cabY=-hh, bedY=-hh+cabH+h*0.06;
    // Bed
    ctx.fillStyle=darken(color,25);
    ctx.beginPath();ctx.roundRect(-hw+1,bedY,w-2,bedH,2);ctx.fill();
    // Bed liner (dark)
    ctx.fillStyle='rgba(15,15,15,0.75)';
    ctx.beginPath();ctx.roundRect(-hw+3,bedY+3,w-6,bedH-6,2);ctx.fill();
    // Bed rails
    ctx.fillStyle=darken(color,15);
    ctx.beginPath();ctx.roundRect(-hw+1,bedY,w-2,4,1);ctx.fill(); // top rail
    ctx.beginPath();ctx.roundRect(-hw+1,bedY+bedH-4,w-2,4,1);ctx.fill(); // tail
    ctx.beginPath();ctx.roundRect(-hw+1,bedY,2.5,bedH,1);ctx.fill(); // left
    ctx.beginPath();ctx.roundRect(hw-3.5,bedY,2.5,bedH,1);ctx.fill(); // right
    // Cab
    ctx.fillStyle=color;
    ctx.beginPath();ctx.roundRect(-hw,cabY,w,cabH+4,4);ctx.fill();
    // Cab roof
    ctx.fillStyle=darken(color,22);
    ctx.beginPath();ctx.roundRect(-hw*0.82,cabY+h*0.08,w*0.82,cabH*0.72,3);ctx.fill();
    // Cab-bed divider panel
    ctx.fillStyle=darken(color,8);
    ctx.beginPath();ctx.roundRect(-hw,-hh+cabH,w,h*0.07,1);ctx.fill();
    // Door handle
    ctx.fillStyle='rgba(180,180,180,0.5)';
    ctx.beginPath();ctx.roundRect(-hw+1,cabY+cabH*0.44,2.5,1.8,0.5);ctx.fill();
    ctx.beginPath();ctx.roundRect(hw-3.5,cabY+cabH*0.44,2.5,1.8,0.5);ctx.fill();

  } else if(type==='van'){
    // Van/minivan: tall boxy, flat nose, sliding side door
    ctx.fillStyle=color;
    ctx.beginPath();ctx.roundRect(-hw,-hh,w,h,3);ctx.fill();
    // Flat nose
    ctx.fillStyle=darken(color,10);
    ctx.beginPath();ctx.roundRect(-hw+1,-hh+1,w-2,h*0.14,2);ctx.fill();
    // Big flat roof
    ctx.fillStyle=darken(color,18);
    ctx.beginPath();ctx.roundRect(-hw*0.85,-hh+h*0.14,w*0.85,h*0.65,2);ctx.fill();
    // Roof accent strip
    ctx.fillStyle=darken(color,30);
    ctx.beginPath();ctx.roundRect(-hw*0.84,-hh+h*0.14,w*0.84,h*0.04,1);ctx.fill();
    // Sliding door track
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;
    ctx.setLineDash([3,2]);
    ctx.beginPath();ctx.moveTo(-hw*0.2,-hh+h*0.32);ctx.lineTo(hw*0.7,-hh+h*0.32);ctx.stroke();
    ctx.setLineDash([]);
    // Door handle
    ctx.fillStyle='rgba(180,180,180,0.5)';
    ctx.beginPath();ctx.roundRect(-hw+1,-hh+h*0.4,2.5,1.8,0.5);ctx.fill();
    ctx.beginPath();ctx.roundRect(hw-3.5,-hh+h*0.4,2.5,1.8,0.5);ctx.fill();
    // Step
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.beginPath();ctx.roundRect(-hw,hh-h*0.15,w,h*0.06,1);ctx.fill();
  }

  // ── Glass (all types) ────────────────────────────────────
  const ga=isPlayer?0.58:0.46;

  // Windshield - type-specific proportions
  const wsConfigs={
    sedan:{y:0.07,h:0.18,w:0.64},
    suv:  {y:0.20,h:0.16,w:0.70},
    sports:{y:0.30,h:0.14,w:0.60},
    truck:{y:0.10,h:0.16,w:0.72},
    van:  {y:0.14,h:0.14,w:0.80},
  };
  const wsCfg=wsConfigs[type]||wsConfigs.sedan;
  const wsY=-hh+h*wsCfg.y, wsH=h*wsCfg.h, wsW=w*wsCfg.w;

  // Glass tint
  ctx.fillStyle=`rgba(120,175,235,${ga})`;
  ctx.beginPath();ctx.roundRect(-wsW/2,wsY,wsW,wsH,2);ctx.fill();
  // Glass reflection streak
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.beginPath();ctx.roundRect(-wsW/2+2,wsY+1,wsW*0.3,wsH*0.45,1);ctx.fill();
  // Wiper line
  ctx.strokeStyle='rgba(60,60,60,0.5)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(-wsW/2+3,wsY+wsH-2);ctx.lineTo(wsW/2-3,wsY+wsH-2);ctx.stroke();

  // Rear glass
  const rwConfigs={
    sedan:{y:0.75,h:0.15,w:0.55},
    suv:  {y:0.74,h:0.13,w:0.60},
    sports:{y:0.68,h:0.1,w:0.45},
    truck:{y:0.57,h:0.13,w:0.65},
    van:  {y:0.79,h:0.12,w:0.75},
  };
  const rwCfg=rwConfigs[type]||rwConfigs.sedan;
  const rwY=-hh+h*rwCfg.y, rwH=h*rwCfg.h, rwW=w*rwCfg.w;
  ctx.fillStyle=`rgba(100,155,210,${ga*0.82})`;
  ctx.beginPath();ctx.roundRect(-rwW/2,rwY,rwW,rwH,2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.beginPath();ctx.roundRect(-rwW/2+2,rwY+1,rwW*0.28,rwH*0.5,1);ctx.fill();

  // Side windows (sedan/SUV/van)
  if(type==='sedan'||type==='suv'||type==='van'){
    const swY=-hh+h*(type==='van'?0.28:0.3);
    const swH=h*(type==='van'?0.36:0.24);
    ctx.fillStyle=`rgba(120,175,235,${ga*0.72})`;
    ctx.beginPath();ctx.roundRect(-hw+1.5,swY,w*0.115,swH,1);ctx.fill();
    ctx.beginPath();ctx.roundRect(hw-w*0.115-1.5,swY,w*0.115,swH,1);ctx.fill();
    // Pillar (B-pillar)
    ctx.fillStyle=darken(color,20);
    ctx.beginPath();ctx.roundRect(-w*0.06,swY,w*0.12,swH,0);ctx.fill();
  }

  // ── Wheels ───────────────────────────────────────────────
  // Type-specific wheel positions and sizes
  const wheelConfigs={
    sedan: {fx:hw*0.78,fy:-hh+h*0.19,rx:hw*0.78,ry:hh-h*0.19,r:hw*0.55},
    suv:   {fx:hw*0.80,fy:-hh+h*0.18,rx:hw*0.80,ry:hh-h*0.18,r:hw*0.58},
    sports:{fx:hw*0.82,fy:-hh+h*0.18,rx:hw*0.82,ry:hh-h*0.2, r:hw*0.62},
    truck: {fx:hw*0.80,fy:-hh+h*0.14,rx:hw*0.80,ry:hh-h*0.12,r:hw*0.58},
    van:   {fx:hw*0.78,fy:-hh+h*0.15,rx:hw*0.78,ry:hh-h*0.15,r:hw*0.55},
  };
  const wc=wheelConfigs[type]||wheelConfigs.sedan;
  const wr=Math.min(wc.r,6.5);
  const wheelPts=[[-wc.fx,wc.fy],[wc.fx,wc.fy],[-wc.rx,wc.ry],[wc.rx,wc.ry]];

  wheelPts.forEach(([wx,wy])=>{
    // Tyre shadow
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.beginPath();ctx.ellipse(wx,wy,wr*1.15,wr*0.88,0,0,Math.PI*2);ctx.fill();
    // Tyre
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.ellipse(wx,wy,wr,wr*0.82,0,0,Math.PI*2);ctx.fill();
    // Tyre tread detail
    ctx.strokeStyle='rgba(50,50,50,0.8)';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.ellipse(wx,wy,wr*0.88,wr*0.72,0,0,Math.PI*2);ctx.stroke();
    // Alloy rim
    ctx.fillStyle='#d0d0d0';
    ctx.beginPath();ctx.ellipse(wx,wy,wr*0.6,wr*0.5,0,0,Math.PI*2);ctx.fill();
    // Rim inner shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath();ctx.ellipse(wx,wy,wr*0.48,wr*0.4,0,0,Math.PI*2);ctx.fill();
    // 5-spoke alloy
    for(let s=0;s<5;s++){
      const angle=(s/5)*Math.PI*2;
      const sx1=wx+Math.cos(angle)*wr*0.16, sy1=wy+Math.sin(angle)*wr*0.16;
      const sx2=wx+Math.cos(angle)*wr*0.52, sy2=wy+Math.sin(angle)*wr*0.52;
      ctx.strokeStyle='#bbb';ctx.lineWidth=1.4;
      ctx.beginPath();ctx.moveTo(sx1,sy1);ctx.lineTo(sx2,sy2);ctx.stroke();
    }
    // Centre cap
    ctx.fillStyle='#888';
    ctx.beginPath();ctx.ellipse(wx,wy,wr*0.12,wr*0.1,0,0,Math.PI*2);ctx.fill();
    // Brake disc (orange glow if braking hard)
    if(braking){
      ctx.fillStyle='rgba(255,80,0,0.18)';
      ctx.beginPath();ctx.ellipse(wx,wy,wr*0.5,wr*0.42,0,0,Math.PI*2);ctx.fill();
    }
  });

  // ── Wing mirrors ─────────────────────────────────────────
  const mirY=-hh+h*0.24;
  ctx.fillStyle=darken(color,15);
  // Left mirror - angled trapezoid
  ctx.beginPath();
  ctx.moveTo(-hw,mirY-1.5);ctx.lineTo(-hw-4,mirY-0.5);
  ctx.lineTo(-hw-4,mirY+2.5);ctx.lineTo(-hw,mirY+1.5);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=0.5;ctx.stroke();
  // Right mirror
  ctx.beginPath();
  ctx.moveTo(hw,mirY-1.5);ctx.lineTo(hw+4,mirY-0.5);
  ctx.lineTo(hw+4,mirY+2.5);ctx.lineTo(hw,mirY+1.5);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=0.5;ctx.stroke();

  // ── Headlights ───────────────────────────────────────────
  const hlY=-hh+1.5;
  const hlW=w*(type==='sports'?0.26:0.22), hlH=type==='sports'?2.5:3;

  // Outer housing
  ctx.fillStyle='rgba(30,30,40,0.9)';
  ctx.beginPath();ctx.roundRect(-hw+2,hlY-0.5,hlW+1,hlH+1,1.5);ctx.fill();
  ctx.beginPath();ctx.roundRect(hw-2-hlW-1,hlY-0.5,hlW+1,hlH+1,1.5);ctx.fill();

  // Main bulb
  ctx.fillStyle='#fffde7';
  ctx.beginPath();ctx.roundRect(-hw+2.5,hlY,hlW,hlH,1);ctx.fill();
  ctx.beginPath();ctx.roundRect(hw-2.5-hlW,hlY,hlW,hlH,1);ctx.fill();

  // DRL strip
  ctx.fillStyle='rgba(220,240,255,0.85)';
  ctx.beginPath();ctx.roundRect(-hw+4,hlY+1,hlW*0.55,1.2,0.5);ctx.fill();
  ctx.beginPath();ctx.roundRect(hw-4-hlW*0.55,hlY+1,hlW*0.55,1.2,0.5);ctx.fill();

  // Headlight lens shine
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath();ctx.ellipse(-hw+2.5+hlW*0.25,hlY+0.8,hlW*0.18,0.7,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(hw-2.5-hlW*0.75,hlY+0.8,hlW*0.18,0.7,0,0,Math.PI*2);ctx.fill();

  // Light beam cone
  const bGrad=ctx.createLinearGradient(0,-hh,0,-hh-100);
  bGrad.addColorStop(0,isPlayer?'rgba(255,255,200,0.18)':'rgba(255,255,200,0.08)');
  bGrad.addColorStop(1,'rgba(255,255,200,0)');
  ctx.fillStyle=bGrad;
  ctx.beginPath();
  ctx.moveTo(-hw+2,-hh);ctx.lineTo(-hw-18,-hh-100);ctx.lineTo(hw+18,-hh-100);ctx.lineTo(hw-2,-hh);
  ctx.fill();

  // ── Taillights ───────────────────────────────────────────
  const tlY=hh-1.5;
  const tlW=w*(type==='sports'?0.28:0.24), tlH=type==='sports'?2.2:3;
  const tlColor=braking?'#ff1010':(isPlayer?'#dd0000':'#770000');

  ctx.fillStyle='rgba(20,0,0,0.8)';
  ctx.beginPath();ctx.roundRect(-hw+2,tlY-tlH-0.5,tlW+1,tlH+1,1.5);ctx.fill();
  ctx.beginPath();ctx.roundRect(hw-2-tlW-1,tlY-tlH-0.5,tlW+1,tlH+1,1.5);ctx.fill();

  ctx.fillStyle=tlColor;
  ctx.beginPath();ctx.roundRect(-hw+2.5,tlY-tlH,tlW,tlH,1);ctx.fill();
  ctx.beginPath();ctx.roundRect(hw-2.5-tlW,tlY-tlH,tlW,tlH,1);ctx.fill();

  // Reverse lights (white inner strip on brake)
  if(braking){
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.beginPath();ctx.roundRect(-hw+2.5+tlW*0.6,tlY-tlH,tlW*0.35,tlH,1);ctx.fill();
    ctx.beginPath();ctx.roundRect(hw-2.5-tlW,tlY-tlH,tlW*0.35,tlH,1);ctx.fill();
  }

  // Brake glow bloom
  if(braking){
    const bg1=ctx.createRadialGradient(-hw+2.5+tlW/2,tlY-1,0,-hw+2.5+tlW/2,tlY-1,22);
    bg1.addColorStop(0,'rgba(255,20,20,0.4)');bg1.addColorStop(1,'rgba(255,20,20,0)');
    ctx.fillStyle=bg1;ctx.fillRect(-hw-8,tlY-22,44,26);
    const bg2=ctx.createRadialGradient(hw-2.5-tlW/2,tlY-1,0,hw-2.5-tlW/2,tlY-1,22);
    bg2.addColorStop(0,'rgba(255,20,20,0.4)');bg2.addColorStop(1,'rgba(255,20,20,0)');
    ctx.fillStyle=bg2;ctx.fillRect(hw-36,tlY-22,44,26);
  }

  // ── Exhaust pipes ────────────────────────────────────────
  if(type==='sedan'||type==='sports'){
    const exN=type==='sports'?2:1;
    const exPositions=type==='sports'?[[-hw*0.35,hh-1],[hw*0.35,hh-1]]:[[0,hh-1]];
    exPositions.forEach(([ex,ey])=>{
      ctx.fillStyle='rgba(30,30,30,0.9)';
      ctx.beginPath();ctx.ellipse(ex,ey,2.5,1.5,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(100,100,100,0.6)';ctx.lineWidth=0.8;
      ctx.beginPath();ctx.ellipse(ex,ey,2.5,1.5,0,0,Math.PI*2);ctx.stroke();
      // Heat shimmer
      if(player.speed>2.5||!isPlayer){
        ctx.fillStyle='rgba(180,180,180,0.12)';
        ctx.beginPath();ctx.ellipse(ex,ey+2,3,4,0,0,Math.PI*2);ctx.fill();
      }
    });
  }

  // ── License plate ────────────────────────────────────────
  const lpW=w*0.36, lpH=3.5, lpY=hh-6;
  ctx.fillStyle='#f0f0ee';
  ctx.beginPath();ctx.roundRect(-lpW/2,lpY,lpW,lpH,0.5);ctx.fill();
  ctx.strokeStyle='rgba(150,150,150,0.5)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.roundRect(-lpW/2,lpY,lpW,lpH,0.5);ctx.stroke();
  // Plate text hint
  ctx.fillStyle='rgba(0,0,180,0.5)';
  ctx.fillRect(-lpW/2+1,lpY+0.8,lpW-2,1.5);

  // ── Body metallic sheen ──────────────────────────────────
  const sheen=ctx.createLinearGradient(-hw,-hh,hw,hh);
  sheen.addColorStop(0,'rgba(255,255,255,0)');
  sheen.addColorStop(0.3,'rgba(255,255,255,0.08)');
  sheen.addColorStop(0.5,'rgba(255,255,255,0.14)');
  sheen.addColorStop(0.7,'rgba(255,255,255,0.06)');
  sheen.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sheen;
  ctx.beginPath();ctx.roundRect(-hw,-hh,w,h,3);ctx.fill();

  // ── Player glow outline ──────────────────────────────────
  if(isPlayer){
    const gA=gracePeriod>0?0.45+0.5*Math.abs(Math.sin(Date.now()*0.012)):0.7;
    ctx.shadowBlur=gracePeriod>0?0:8;
    ctx.shadowColor='rgba(48,170,255,0.5)';
    ctx.strokeStyle=gracePeriod>0?`rgba(255,255,80,${gA})`:'rgba(48,170,255,0.85)';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(-hw,-hh,w,h,3);ctx.stroke();
    ctx.shadowBlur=0;
  }

  ctx.globalAlpha=1;
  ctx.restore();
}

function drawRain(){
  if(currentWeather.rain<=0)return;
  const a=Math.min(0.5,0.18*currentWeather.rain);
  ctx.strokeStyle=`rgba(180,215,255,${a})`;ctx.lineWidth=1;
  rainDrops.forEach(d=>{ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x+2,d.y+d.len);ctx.stroke();});
}

function drawParticles(){
  particles.forEach(p=>{ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();});
}

function drawPlayerArrow(){
  if(!player.alive)return;
  const x=player.x,y=player.y-player.h/2-12;
  ctx.save();ctx.fillStyle='rgba(48,170,255,0.6)';
  ctx.beginPath();ctx.moveTo(x,y-7);ctx.lineTo(x-5,y);ctx.lineTo(x+5,y);ctx.closePath();ctx.fill();ctx.restore();
}

// ── Main Loop ────────────────────────────────────────────────
let last=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-last)/16.67,3);last=ts;
  update(dt);
  drawRoad();drawRain();

  const sorted=[...cars].sort((a,b)=>a.y-b.y);
  sorted.forEach(c=>drawCar(c.x,c.y,c.w,c.h,c.type,c.color,c.braking,false,0,1));

  if(state==='playing'||state==='dead'){
    drawPlayerArrow();
    let pA=1;
    if(!player.alive){const t=player.crashAnim;pA=Math.max(0,1-t*0.014)*(Math.sin(t*0.75)>0?1:0.25);}
    drawCar(player.x,player.y,player.w,player.h,'sedan','#1e88e5',false,true,player.wobble,pA);
  }

  drawParticles();

  // Scanlines
  ctx.fillStyle='rgba(0,0,0,0.022)';
  for(let sy=0;sy<H;sy+=4)ctx.fillRect(0,sy,W,1);

  // Vignette
  const vig=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.88);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
}
requestAnimationFrame(loop);
</script>
